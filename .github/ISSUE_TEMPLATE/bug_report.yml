name: Báo cáo bug
description: Báo cáo lỗi trong Harness (hành vi không mong đợi, crash, lỗi cài đặt, v.v.)
title: "[bug] "
labels: ["bug", "needs-triage"]
assignees:
  - revfactory
body:
  - type: markdown
    attributes:
      value: |
        Cảm ơn bạn đã dành thời gian báo cáo bug.

        Trước khi gửi, vui lòng lướt qua các issue đang mở để tránh trùng lặp.

        **SLA Triage:** chúng tôi đặt mục tiêu gắn nhãn issue mới trong 48h và phản hồi thực chất trong 72h trong ngày làm việc (xem [CONTRIBUTING.md](../../CONTRIBUTING.md)).

  - type: input
    id: claude-code-version
    attributes:
      label: Phiên bản Claude Code
      description: Đầu ra của `claude --version` (v.d. `2.3.1`)
      placeholder: "2.x.y"
    validations:
      required: true

  - type: dropdown
    id: experimental-flag
    attributes:
      label: Trạng thái cờ Agent Teams thử nghiệm
      description: "`CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` có được đặt trong shell nơi bạn gặp bug này không?"
      options:
        - "Có, cờ được đặt là 1"
        - "Không, cờ chưa được đặt"
        - "Tôi không biết / Không áp dụng"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Các bước tái hiện
      description: Các bước tối thiểu để tái hiện. Vui lòng cung cấp lệnh, config và đầu vào.
      placeholder: |
        1. `claude plugin marketplace add harness@harness`
        2. `export CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1`
        3. `claude "xây harness cho ..."`
        4. quan sát ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Hành vi mong đợi
      description: Bạn mong đợi điều gì xảy ra?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Hành vi thực tế
      description: Điều gì thực sự đã xảy ra? Bao gồm thông báo lỗi / stack trace nguyên văn.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Hệ điều hành
      options:
        - "macOS"
        - "Linux"
        - "Windows (WSL)"
        - "Windows (native)"
        - "Khác (mô tả bên dưới)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Ngữ cảnh bổ sung (tùy chọn)
      description: Log, ảnh chụp màn hình hoặc bất cứ điều gì có thể giúp ích. Che đi thông tin nhạy cảm.
    validations:
      required: false
