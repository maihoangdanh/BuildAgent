name: Câu hỏi
description: Đặt câu hỏi về cách dùng hoặc yêu cầu làm rõ về Harness
title: "[question] "
labels: ["question", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Câu hỏi luôn được chào đón. Nếu câu hỏi của bạn mang tính mở hoặc mời thảo luận, [GitHub Discussions](https://github.com/revfactory/harness/discussions) thường là nơi phù hợp hơn.

        Chúng tôi cố gắng triage câu hỏi trong 48h.

  - type: textarea
    id: question
    attributes:
      label: Câu hỏi của bạn
      description: Bạn muốn biết điều gì?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: Bạn đã thử gì?
      description: Các lệnh đã chạy, tài liệu đã đọc, các issue liên quan bạn đã tìm thấy.
    validations:
      required: false

  - type: textarea
    id: docs
    attributes:
      label: Tài liệu / liên kết liên quan (tùy chọn)
      description: Dán liên kết đến các phần của README, docs hoặc issue bạn đã đọc.
    validations:
      required: false
